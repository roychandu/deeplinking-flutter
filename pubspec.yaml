name: deeplinking
description: A lightweight developer-first mobile attribution and deep linking SDK for Link Traker (FDL alternative).
version: 1.0.0
homepage: https://github.com/roychandu/Link-Traker
repository: https://github.com/roychandu/Link-Traker
issue_tracker: https://github.com/roychandu/Link-Traker/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.deeplinking.sdk
        pluginClass: DeeplinkingPlugin
